name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Architectural or UX impact
      description: Mention if this affects prompts, tools, providers, config, or workflow semantics
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
